name: CI Pipeline

on:
  push:

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run linter
        run: |
          echo "Running linter..."
          # Replace with your linter command
          echo "Lint successful"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          echo "Running tests..."
          # Replace with your test command
          echo "All tests passed"

  build:
    name: Build Artifact
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build application
        run: |
          mkdir build
          echo "Hello GitHub Actions!" > build/app.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: build/
